# Application Configuration
app:
  name: "Browser Orchestrator"
  version: "1.0.0"
  debug: false

server:
  host: "0.0.0.0"
  port: 3101
  cors_enabled: true

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} - {message}"
  file: "./logs/browser-orchestrator.log"
  rotation: "100 MB"
  retention: "7 days"

healthcheck:
  enabled: true
  interval_seconds: 60
  endpoint: "/health"

# Feature flags
features:
  enable_fallback: true
  enable_caching: false
  enable_metrics: true
